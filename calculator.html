<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --calc-bg: #ffffff;
            --calc-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            --display-bg: #1a1a1a;
            --display-color: #ffffff;
            --btn-bg: #f0f0f0;
            --btn-color: #333333;
            --btn-hover: #e0e0e0;
            --btn-shadow: rgba(0, 0, 0, 0.2);
            --theme-btn-bg: #e8e8e8;
            --theme-btn-color: #333333;
            --history-bg: #f5f5f8;
            --history-border: #e0e0e8;
            --history-muted: #666666;
            --history-hover: #ebebf0;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --calc-bg: #2d2d44;
            --calc-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            --display-bg: #0f0f1a;
            --display-color: #e8e8e8;
            --btn-bg: #3d3d5c;
            --btn-color: #e8e8e8;
            --btn-hover: #4d4d6c;
            --btn-shadow: rgba(0, 0, 0, 0.4);
            --theme-btn-bg: #4d4d6c;
            --theme-btn-color: #e8e8e8;
            --history-bg: #252538;
            --history-border: #3d3d5c;
            --history-muted: #a0a0b8;
            --history-hover: #353550;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            padding: 20px;
            transition: background 0.3s ease;
        }

        .app {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 720px;
            align-items: stretch;
        }

        @media (min-width: 700px) {
            .app {
                flex-direction: row;
                align-items: flex-start;
                max-width: 820px;
            }
        }

        .calculator {
            background: var(--calc-bg);
            border-radius: 20px;
            box-shadow: var(--calc-shadow);
            padding: 30px;
            max-width: 400px;
            width: 100%;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .calculator-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .theme-toggle {
            background: var(--theme-btn-bg);
            color: var(--theme-btn-color);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.25rem;
            padding: 0;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .theme-toggle:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 12px var(--btn-shadow);
        }

        .theme-toggle:active {
            transform: scale(0.96);
        }

        .display {
            background: var(--display-bg);
            color: var(--display-color);
            font-size: 2.5rem;
            padding: 20px;
            text-align: right;
            border-radius: 10px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            word-wrap: break-word;
            overflow-wrap: break-word;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            background: var(--btn-bg);
            border: none;
            border-radius: 10px;
            font-size: 1.5rem;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            color: var(--btn-color);
        }

        button:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--btn-shadow);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px var(--btn-shadow);
        }

        .operator {
            background: #667eea;
            color: #ffffff;
        }

        .operator:hover {
            background: #5568d3;
        }

        .equals {
            background: #764ba2;
            color: #ffffff;
        }

        .equals:hover {
            background: #653a8a;
        }

        .clear {
            background: #ff6b6b;
            color: #ffffff;
        }

        .clear:hover {
            background: #ee5a5a;
        }

        .zero {
            grid-column: span 2;
        }

        .history-panel {
            background: var(--calc-bg);
            border-radius: 20px;
            box-shadow: var(--calc-shadow);
            padding: 20px;
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            max-height: 520px;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .history-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--btn-color);
        }

        .history-clear {
            background: transparent;
            color: var(--history-muted);
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 500;
        }

        .history-clear:hover {
            background: var(--history-hover);
            color: var(--btn-color);
            transform: none;
            box-shadow: none;
        }

        .history-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            min-height: 80px;
        }

        .history-list:empty::after {
            content: 'Пока нет операций';
            display: block;
            text-align: center;
            color: var(--history-muted);
            font-size: 0.9rem;
            padding: 24px 12px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: 8px;
            border-bottom: 1px solid var(--history-border);
            cursor: pointer;
            transition: background 0.15s;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item:hover {
            background: var(--history-hover);
        }

        .history-expression {
            font-size: 0.9rem;
            color: var(--history-muted);
            word-break: break-all;
        }

        .history-result {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--btn-color);
            margin-top: 2px;
        }

        .history-result.error {
            color: #ff6b6b;
        }
    </style>
    <script>
        (function () {
            const stored = localStorage.getItem('calculator-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = stored || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <div class="app">
    <div class="calculator">
        <div class="calculator-header">
            <button type="button" class="theme-toggle" id="themeToggle" aria-label="Переключить тему" title="Переключить тему">🌙</button>
        </div>
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendOperator('/')">/</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('-')">-</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="equals" onclick="calculate()" rowspan="2">=</button>
            
            <button class="zero" onclick="appendNumber('0')">0</button>
            <button onclick="appendDecimal()">.</button>
        </div>
    </div>

    <aside class="history-panel" aria-label="Журнал операций">
        <div class="history-header">
            <h2>Журнал</h2>
            <button type="button" class="history-clear" id="historyClear" title="Очистить журнал">Очистить</button>
        </div>
        <ul class="history-list" id="historyList"></ul>
    </aside>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('calculator-theme', theme);
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            themeToggle.setAttribute('aria-label', theme === 'dark' ? 'Светлая тема' : 'Тёмная тема');
        }

        themeToggle.addEventListener('click', function () {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            applyTheme(next);
        });

        applyTheme(document.documentElement.getAttribute('data-theme') || 'light');

        let display = document.getElementById('display');
        const historyList = document.getElementById('historyList');
        const historyClear = document.getElementById('historyClear');
        let currentInput = '0';
        let shouldResetDisplay = false;
        let history = [];
        const HISTORY_MAX = 50;
        const HISTORY_STORAGE_KEY = 'calculator-history';

        function formatForDisplay(expr) {
            return expr.replace(/\*/g, '×');
        }

        function loadHistory() {
            try {
                const saved = localStorage.getItem(HISTORY_STORAGE_KEY);
                if (saved) {
                    history = JSON.parse(saved);
                    renderHistory();
                }
            } catch (_) {
                history = [];
            }
        }

        function saveHistory() {
            localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(history));
        }

        function addToHistory(expression, result) {
            history.unshift({ expression, result });
            if (history.length > HISTORY_MAX) {
                history.pop();
            }
            saveHistory();
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = '';
            history.forEach(function (entry, index) {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.setAttribute('role', 'button');
                li.setAttribute('tabindex', '0');
                li.title = 'Подставить результат';

                const exprEl = document.createElement('div');
                exprEl.className = 'history-expression';
                exprEl.textContent = entry.expression + ' =';

                const resultEl = document.createElement('div');
                resultEl.className = 'history-result' + (entry.result === 'Ошибка' ? ' error' : '');
                resultEl.textContent = entry.result;

                li.appendChild(exprEl);
                li.appendChild(resultEl);

                function useResult() {
                    if (entry.result === 'Ошибка') return;
                    currentInput = entry.result;
                    shouldResetDisplay = true;
                    updateDisplay();
                }

                li.addEventListener('click', useResult);
                li.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        useResult();
                    }
                });

                historyList.appendChild(li);
            });
        }

        historyClear.addEventListener('click', function () {
            history = [];
            saveHistory();
            renderHistory();
        });

        loadHistory();

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function appendNumber(number) {
            if (shouldResetDisplay) {
                currentInput = '0';
                shouldResetDisplay = false;
            }
            
            if (currentInput === '0') {
                currentInput = number;
            } else {
                currentInput += number;
            }
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetDisplay) {
                currentInput = '0';
                shouldResetDisplay = false;
            }
            
            if (!currentInput.includes('.')) {
                currentInput += '.';
                updateDisplay();
            }
        }

        function appendOperator(operator) {
            if (shouldResetDisplay) {
                shouldResetDisplay = false;
            }
            
            const lastChar = currentInput[currentInput.length - 1];
            if (['+', '-', '*', '/'].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + operator;
            } else {
                currentInput += operator;
            }
            updateDisplay();
        }

        function calculate() {
            const exprDisplay = formatForDisplay(currentInput);
            if (currentInput === 'Ошибка' || currentInput === '0') {
                return;
            }

            try {
                let expression = currentInput.replace(/×/g, '*');

                if (expression.includes('/0') && !expression.includes('/0.')) {
                    currentInput = 'Ошибка';
                    addToHistory(exprDisplay, 'Ошибка');
                    updateDisplay();
                    shouldResetDisplay = true;
                    return;
                }

                const result = Function('"use strict"; return (' + expression + ')')();
                let resultStr;

                if (isNaN(result) || !isFinite(result)) {
                    resultStr = 'Ошибка';
                    currentInput = 'Ошибка';
                } else {
                    resultStr = result.toString();
                    currentInput = resultStr;
                }

                addToHistory(exprDisplay, resultStr);
                updateDisplay();
                shouldResetDisplay = true;
            } catch (error) {
                currentInput = 'Ошибка';
                addToHistory(exprDisplay, 'Ошибка');
                updateDisplay();
                shouldResetDisplay = true;
            }
        }

        function clearDisplay() {
            currentInput = '0';
            shouldResetDisplay = false;
            updateDisplay();
        }

        function deleteLast() {
            if (shouldResetDisplay) {
                clearDisplay();
                return;
            }
            
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        // Поддержка клавиатуры
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            if (key >= '0' && key <= '9') {
                appendNumber(key);
            } else if (key === '.') {
                appendDecimal();
            } else if (key === '+') {
                appendOperator('+');
            } else if (key === '-') {
                appendOperator('-');
            } else if (key === '*') {
                appendOperator('*');
            } else if (key === '/') {
                event.preventDefault();
                appendOperator('/');
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearDisplay();
            } else if (key === 'Backspace') {
                deleteLast();
            }
        });
    </script>
</body>
</html>
